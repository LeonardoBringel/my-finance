services:
  db:
    image: postgres:16-alpine
    container_name: my_finance_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance_net

  app:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-latest}
    container_name: my_finance_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      UV_NO_SYNC: "1"
      TZ: America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /var/log/my-finance:/var/log/my-finance
    networks:
      - finance_net
    command: >
      sh -c "uv run alembic upgrade head && uv run streamlit run app.py"

volumes:
  postgres_data:

networks:
  finance_net:
    driver: bridge
